spring:
  application:
      name: shopapp
  datasource:
    url: 'jdbc:mysql://localhost:3306/shopapp?createDatabaseIfNotExist=true'
    username: root
    password: 123456789
    driver-class-name: 'com.mysql.cj.jdbc.Driver'
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format-sql: true
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: 8080
  servlet:
    context-path: /api/v1

